   <div class="login-container">

        <form action=" c:/xampp/htdocs/Project/registration.php" method="POST">
            <input type="text" placeholder="Username" required name="username">
            <input type="text" placeholder="Address" required name="address">
            <input type="tel" placeholder="Phone Number" required name="phone">
            <input type="date" placeholder="Date of Birth" required id="dob" name="dob">
            <input type="email" placeholder="Email" required name="email">
            <input type="password" placeholder="Password" required minlength="8" name="password">
            <input type="password" placeholder="Confirm Password" required minlength="8" name="confirm_password">
            <button type="submit">Sign Up</button>
            <p class="p"><span>Already have an account?</span><a href="login.html" class="a">Login</a></p>
        </form>
