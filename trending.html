<!-- ===== JS ===== -->
<script src="JS/function.js"></script>

<script>
  const links = document.querySelectorAll(".nav-links a");

  links.forEach(link => {
    link.addEventListener("click", () => {
      links.forEach(l => l.classList.remove("active"));
      link.classList.add("active");
    });
  });
</script>


</body>
